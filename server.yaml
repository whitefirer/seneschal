# 监听地址。默认 127.0.0.1 仅本机访问。
# 如需对外暴露,设为 "0.0.0.0",但务必放在带鉴权/TLS/限流的反向代理之后
# (当前版本未做鉴权,shell action 会以服务进程身份执行任意命令)。
host: "127.0.0.1"
port: "8888"
workflows_dir: "./workflows/user"
allowed_origins:
  - "http://localhost:8888"
  - "http://localhost:5173"
  - "http://127.0.0.1:8888"
  - "http://127.0.0.1:5173"
