# seneschal server 配置示例。
#
# 复制本文件为 server.yaml 并按需修改:
#   cp config.example.yaml server.yaml
#
# server.yaml 是本机实际配置,不会提交到 git(见 .gitignore)。
# 若启动时 server.yaml 不存在,server 使用内置安全默认值(见 config.Default())。

# 监听地址。
#   "127.0.0.1" —— 仅本机访问(默认,安全)
#   "0.0.0.0"   —— 监听所有网卡,允许外部访问
# 对外暴露务必放在带鉴权/TLS/限流的反向代理之后
# (当前版本未做鉴权,shell action 会以服务进程身份执行任意命令)。
host: "127.0.0.1"

# 监听端口。
port: "8888"

# workflow YAML 文件目录。
workflows_dir: "./workflows/user"

# 执行历史快照目录(每次执行落盘一个 JSON)。
# 含敏感数据(变量值、命令输出),不提交到 git(见 .gitignore 的 executions/)。
executions_dir: "./executions"

# WebSocket 允许的 Origin 列表(同源校验)。
# 空列表 = 允许所有 Origin(不安全,仅开发用)。
allowed_origins:
  - "http://localhost:8888"
  - "http://localhost:5173"
  - "http://127.0.0.1:8888"
  - "http://127.0.0.1:5173"

# AI 全局默认配置。所有 workflow 共享;workflow YAML 的 ai: 段可覆盖,step.model 可单步覆盖。
# API key 只从环境变量读(ANTHROPIC_API_KEY / DEEPSEEK_API_KEY),不写在这里。
# ai:
#   provider: anthropic                          # 或未来的 openai / ollama
#   model: deepseek-v4-flash                     # 必填!模型名不硬编码,从这里配
#   base_url: https://api.deepseek.com/anthropic # DeepSeek Anthropic 端点;Claude 用 https://api.anthropic.com
#   max_tokens: 1024
#   temperature: 0
#   budget: 0                                    # 全局 token 上限(input+output),0=不限制
#   memory_window: 0                             # AI 记忆窗口(保留最近 N 轮对话),0=不限制
#   max_retries: 3                               # provider HTTP 自动重试次数(429/5xx/超时)
#
# 本地模型 (Ollama) — 零 API key、零费用、零网络:
# ai:
#   provider: ollama
#   model: qwen3:32b                              # ollama pull 下载的模型 tag
#   base_url: http://localhost:11434              # 可选,默认 localhost:11434;也可用 OLLAMA_HOST 环境变量
#
# OpenAI 兼容 (OpenAI / Moonshot / 智谱 / Groq 等):
# ai:
#   provider: openai
#   model: gpt-4o                                 # 或 moonshot-v1-8k / glm-4 / llama3.1-70b 等
#   base_url: https://api.openai.com/v1          # 可选,改 base_url 切厂商;或用 OPENAI_BASE_URL
#
# 全局 Hook — 对所有 workflow 生效,workflow/step 级 hooks 追加生效:
# hooks:
#   - on: workflow_end                            # after_step | workflow_end
#     when: failed                                # success | failed | always(默认)
#     type: webhook
#     url: https://hooks.example.com/alert
#     message: "workflow {{.workflow_name}} {{.status}}"
#   - on: after_step
#     when: failed
#     type: shell
#     command: "echo '{{.step_name}} failed' >> /var/log/seneschal-errors.log"
