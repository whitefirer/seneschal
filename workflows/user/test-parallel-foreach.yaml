name: test-parallel-foreach
version: "1.0"
description: Test parallel and foreach editing
steps:
  - name: start
    action: log
    message: Starting workflow
    level: info
  - name: parallel-tasks
    action: parallel
    steps:
      - name: task-1
        action: log
        message: Task
        level: info
      - name: task-2
        action: log
        message: Task 2
        level: info
      - name: fetch-data
        action: http
        url: https://httpbin.org/get
        method: GET
  - name: foreach-items
    action: foreach
    loop: items
    items:
      - apple
      - banana
    do:
      - name: process-item
        action: log
        message: Processing item
        level: info
  - name: finish
    action: log
    message: Workflow completed
    level: info
  - name: step-7
    action: log
    message: step-7
  - name: step-8
    action: log
    message: test
  - name: step-9
    action: log
    message: test
