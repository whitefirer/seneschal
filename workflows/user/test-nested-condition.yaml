name: test-nested-condition
description: 测试嵌套condition布局功能
variables:
  env: dev
  debug: true

steps:
  - name: start
    action: log
    message: "开始测试嵌套condition"
    
  - name: check-env
    action: condition
    expression: "{{.env}} == prod"
    then:
      - name: deploy-prod
        action: log
        message: "部署到生产环境"
        
      - name: check-debug-prod
        action: condition
        expression: "{{.debug}} == true"
        then:
          - name: enable-debug-prod
            action: log
            message: "启用生产调试模式"
        else:
          - name: disable-debug-prod
            action: log
            message: "禁用生产调试模式"
          - name: test-debug-prod
            action: condition
            expression: "{{.debug}} == true"
            then:
              - name: enable-test-debug-prod
                action: log
                message: "启用生产调试模式test"
            else:
              - name: disable-test-debug-prod
                action: log
                message: "禁用生产调试模式test"
            
    else:
      - name: deploy-dev
        action: log
        message: "部署到开发环境"
        
      - name: check-debug-dev
        action: condition
        expression: "{{.debug}} == true"
        then:
          - name: enable-debug-dev
            action: log
            message: "启用开发调试模式"
        else:
          - name: disable-debug-dev
            action: log
            message: "禁用开发调试模式"
    
  - name: finish
    action: log
    message: "测试完成"