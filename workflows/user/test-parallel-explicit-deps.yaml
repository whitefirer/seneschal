name: test-parallel-explicit-deps
version: v1.0
description: 测试 Parallel 子节点显式依赖（允许）

steps:
  - name: start
    action: log
    message: Starting

  - name: parallel-tasks
    action: parallel
    steps:
      - name: task-a
        action: shell
        shell: echo "Task A"
      - name: task-b
        action: shell
        shell: echo "Task B"
        depends_on:
          - task-a  # ✅ 显式指定依赖，允许（虽然不推荐）
      - name: task-c
        action: shell
        shell: echo "Task C"
        # 无依赖，与 task-a 并行

  - name: end
    action: log
    message: Done
