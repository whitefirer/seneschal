name: Test Fix
version: "1.0"
description: 测试用例
steps:
  - name: start
    description: 开始
    action: log
    message: Starting workflow
  - name: parallel-task
    action: parallel
    steps:
      - name: child-1
        action: log
        message: Child 1
      - name: child-2
        action: log
        message: Child 2
  - name: sleep-task
    action: sleep
    duration: 1s
  - name: shell-task
    action: shell
    shell: bash
    command: echo -e "\033[1;31m这是红色的文本\033[0m"
  - name: foreach-task
    action: foreach
    items:
      - "alpha"
      - "beta"
      - "gamma"
    item_var: service
    do:
      - name: process
        action: log
        message: "Processing {{.service}}"
  - name: end
    action: log
    message: Workflow complete
