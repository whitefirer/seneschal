name: test-condition-nested
version: "1.0"
description: Test condition nested editing

steps:
  - name: start
    action: log
    message: "Starting workflow"
    level: info

  - name: check-env
    action: condition
    if: env == prod
    then:
      - name: deploy-prod
        action: log
        message: "Deploying to production"
        level: warn
      - name: notify-prod
        action: log
        message: "Notifying team"
        level: info
    else:
      - name: deploy-dev
        action: log
        message: "Deploying to development"
        level: info

  - name: finish
    action: log
    message: "Workflow completed"
    level: info
