name: test-container-nested
version: v1.0
description: 测试 Parallel/Foreach 容器嵌套子节点功能

steps:
  - name: start
    action: log
    message: Starting workflow

  - name: parallel-task
    action: parallel
    steps:
      - name: task-1
        action: log
        message: Task 1 in parallel
      - name: task-2
        action: shell
        shell: echo "Task 2 running"
      - name: task-3
        action: http
        url: https://api.example.com
        method: GET

  - name: foreach-loop
    action: foreach
    items: ["item1", "item2", "item3"]
    item_var: item
    do:
      - name: process-item
        action: log
        message: Processing ${item}
      - name: save-result
        action: shell
        shell: echo "Saved ${item}"

  - name: condition-branch
    action: condition
    if: status == "success"
    then:
      - name: then-step
        action: log
        message: Condition passed
    else:
      - name: else-step
        action: log
        message: Condition failed

  - name: finish
    action: log
    message: Workflow completed
