name: test-large-workflow
version: "1.0"
description: "大规模工作流测试 - 测试分层渲染性能"

variables:
  env: production
  totalItems: 100

steps:
  # 开始日志
  - name: start
    action: log
    message: "🚀 开始大规模工作流测试"
    level: info

  # 环境检查
  - name: check-env
    action: log
    message: "检查环境配置：{{.env}}"
    level: info

  # 并行任务组 1
  - name: parallel-group-1
    action: parallel
    steps:
      - name: task-1-1
        action: shell
        command: "echo 'Task 1-1 completed'"
      - name: task-1-2
        action: shell
        command: "echo 'Task 1-2 completed'"
      - name: task-1-3
        action: shell
        command: "echo 'Task 1-3 completed'"

  # 条件分支测试
  - name: condition-test
    action: condition
    expression: "{{.env}} == production"
    then:
      - name: prod-step-1
        action: log
        message: "Production environment detected"
        level: info
      - name: prod-step-2
        action: log
        message: "Running production tasks"
        level: info
    else:
      - name: dev-step-1
        action: log
        message: "Development environment"
        level: info

  # Foreach 循环 - 50 次迭代（手动展开）
  - name: process-items
    action: foreach
    items:
    - "item-0"
    - "item-1"
    - "item-2"
    - "item-3"
    - "item-4"
    - "item-5"
    - "item-6"
    - "item-7"
    - "item-8"
    - "item-9"
    - "item-10"
    - "item-11"
    - "item-12"
    - "item-13"
    - "item-14"
    - "item-15"
    - "item-16"
    - "item-17"
    - "item-18"
    - "item-19"
    - "item-20"
    - "item-21"
    - "item-22"
    - "item-23"
    - "item-24"
    - "item-25"
    - "item-26"
    - "item-27"
    - "item-28"
    - "item-29"
    - "item-30"
    - "item-31"
    - "item-32"
    - "item-33"
    - "item-34"
    - "item-35"
    - "item-36"
    - "item-37"
    - "item-38"
    - "item-39"
    - "item-40"
    - "item-41"
    - "item-42"
    - "item-43"
    - "item-44"
    - "item-45"
    - "item-46"
    - "item-47"
    - "item-48"
    - "item-49"
    itemVar: item
    do:
      - name: process-item
        action: log
        message: "Processing {{.item}}"
        level: info
      - name: validate-item
        action: log
        message: "Validating {{.item}}"
        level: info

  # 并行任务组 2
  - name: parallel-group-2
    action: parallel
    steps:
      - name: task-2-1
        action: shell
        command: "echo 'Task 2-1 completed'"
      - name: task-2-2
        action: shell
        command: "echo 'Task 2-2 completed'"
      - name: task-2-3
        action: shell
        command: "echo 'Task 2-3 completed'"
      - name: task-2-4
        action: shell
        command: "echo 'Task 2-4 completed'"
      - name: task-2-5
        action: shell
        command: "echo 'Task 2-5 completed'"
      - name: task-2-6
        action: shell
        command: "echo 'Task 2-6 completed'"

  # 嵌套条件测试
  - name: nested-condition
    action: condition
    expression: "{{.totalItems}} > 50"
    then:
      - name: nested-then-1
        action: log
        message: "Large dataset detected"
        level: info
      - name: nested-condition-2
        action: condition
        expression: "{{.env}} == production"
        then:
          - name: prod-nested-1
            action: log
            message: "Production nested task 1"
            level: info
          - name: prod-nested-2
            action: log
            message: "Production nested task 2"
            level: info
        else:
          - name: dev-nested-1
            action: log
            message: "Development nested task"
            level: info
    else:
      - name: nested-else-1
        action: log
        message: "Small dataset"
        level: info

  # 最终日志
  - name: finish
    action: log
    message: "✅ 大规模工作流测试完成"
    level: info
