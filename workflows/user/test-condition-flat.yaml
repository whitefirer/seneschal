name: test-condition-flat
version: v1.0
description: 测试 Condition 扁平 DAG 结构

steps:
  - name: start
    action: log
    message: Starting

  - name: check-status
    action: condition
    if: status == "success"
    then:
      - name: then-step-1
        action: log
        message: Condition passed - step 1
      - name: then-step-2
        action: shell
        shell: echo "Success!"
    else:
      - name: else-step-1
        action: log
        message: Condition failed - step 1
      - name: else-step-2
        action: shell
        shell: echo "Failed!"

  - name: finish
    action: log
    message: Done
