name: Test Condition
version: "1.0"
description: "Test condition layout"

variables:
  env: dev
  debug: "true"

steps:
  - name: start
    action: shell
    command: echo "start"

  - name: check-env
    action: condition
    if: env == "prod"
    then:
      - name: deploy-prod
        action: shell
        command: echo "deploy prod"
      - name: check-debug-prod
        action: condition
        if: debug == "true"
        then:
          - name: enable-debug-prod
            action: shell
            command: echo "enable debug prod"
        else:
          - name: disable-debug-prod
            action: shell
            command: echo "disable debug prod"
    else:
      - name: deploy-dev
        action: shell
        command: echo "deploy dev"
      - name: check-debug-dev
        action: condition
        if: debug == "true"
        then:
          - name: enable-debug-dev
            action: shell
            command: echo "enable debug dev"
        else:
          - name: disable-debug-dev
            action: shell
            command: echo "disable debug dev"

  - name: finish
    action: shell
    command: echo "finish"
