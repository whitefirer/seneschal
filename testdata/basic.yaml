name: basic
description: "Basic actions: shell, log, set, sleep"
variables:
  greeting: hello
steps:
  - name: greet
    action: log
    message: "{{.greeting}} world"
  - name: echo
    action: shell
    command: "echo test"
    save_output: echo_result
  - name: set-var
    action: set
    value: "computed"
  - name: short-sleep
    action: sleep
    duration: "0s"
